<style>
:root{
  --brand:#3DB8D4;--brand2:#2da0ba;--brand-soft:#eaf8fc;
  --green:#27ae60;--orange:#f39c12;--red:#e74c3c;--purple:#8e44ad;
  --text:#1a2332;--muted:#7f8c8d;--border:#e2e8ef;
  --bg:#f4f7fa;--card:#fff;--radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* PWD */
.pwd-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a2332 0%,#2c4a6b 100%);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px}
.pwd-screen h2{font-size:22px;font-weight:800;color:white}
.pwd-screen p{font-size:14px;color:rgba(255,255,255,0.6);text-align:center}
.pwd-input{width:100%;max-width:280px;padding:14px;border:2px solid rgba(255,255,255,0.2);border-radius:12px;font-size:18px;text-align:center;letter-spacing:4px;background:rgba(255,255,255,0.1);color:white}
.pwd-input:focus{outline:none;border-color:var(--brand)}
.pwd-input::placeholder{color:rgba(255,255,255,0.3);letter-spacing:2px}
.pwd-btn{width:100%;max-width:280px;padding:14px;background:var(--brand);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.pwd-btn:active{transform:scale(0.97)}
.pwd-screen img.splash-logo{height:auto;width:auto;max-width:80vw;max-height:42vh;object-fit:contain;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,0.4);margin-bottom:10px}
.pwd-screen img:not(.splash-logo){height:64px;width:auto;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(61,184,212,0.4));margin-bottom:6px}
.pwd-screen h2{display:none}

/* HEADER */
.hdr{background:white;border-bottom:1.5px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:58px;padding-top:env(safe-area-inset-top);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
.hdr img{height:36px;width:auto;object-fit:contain;flex-shrink:0}
.hdrtitle{flex:1}
.hdrtitle h1{font-size:17px;font-weight:800;color:var(--text)}
.hdrtitle p{font-size:11px;color:var(--brand);font-weight:600}
.hbtn{border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.hbtn:active{transform:scale(0.96)}

/* CONTENT */
.content{padding:14px 14px 20px}

/* CARDS */
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.4px}

/* MÉTIER GRID (cases à cocher) */
.metier-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.mb-toggle{padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:white;cursor:pointer;text-align:center;font-size:13px;font-weight:700;color:var(--muted);transition:all 0.15s}
.mb-toggle .mi{font-size:24px;display:block;margin-bottom:6px}
.mb-toggle.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}

/* FORMULAIRE */
.frow{margin-bottom:11px}
.frow:last-child{margin-bottom:0}
.frow label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px}
.finput,.fselect{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:white;-moz-appearance:textfield}
.finput:focus,.fselect:focus{outline:none;border-color:var(--brand)}
.finput::-webkit-outer-spin-button,
.finput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.finput-with-unit{display:flex;align-items:center;gap:8px}
.finput-with-unit .finput{flex:1;min-width:0}
.unit-tag{font-size:13px;color:var(--muted);font-weight:700;flex-shrink:0;padding:0 4px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.frow2 > div{min-width:0}
.frow2 label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px}

/* CHECKBOX rows */
.crow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;margin-bottom:8px;border:1.5px solid transparent}
.crow.on{background:var(--brand-soft);border-color:var(--brand)}
.crow input{width:20px;height:20px;accent-color:var(--brand);flex-shrink:0}
.crow span{flex:1;font-size:14px;font-weight:600;color:var(--text)}

/* MÉTIER BLOCK header */
.mblock{background:white;border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.mblock-title{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1.5px solid var(--border)}
.mblock-title .mi{font-size:22px}
.mblock-title h3{font-size:15px;font-weight:800;color:var(--text);text-transform:none;letter-spacing:0;margin:0}

/* BIG calculate button */
.calc-btn{width:100%;padding:16px;background:var(--brand);color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;margin:8px 0 14px;box-shadow:0 4px 14px rgba(61,184,212,0.35)}
.calc-btn:active{transform:scale(0.98)}
.calc-btn:disabled{background:var(--muted);box-shadow:none;cursor:not-allowed}

/* RESULTS */
.result-card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border);border-left:4px solid var(--brand)}
.result-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px dashed var(--border)}
.result-head .mi{font-size:20px}
.result-head h4{font-size:14px;font-weight:800;color:var(--text);flex:1}
.result-head .ctx{font-size:11px;color:var(--muted);font-weight:600}
.result-line{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:14px;border-bottom:1px dotted var(--border)}
.result-line:last-child{border-bottom:none}
.rl-name{flex:1;color:var(--text);min-width:0}
.rl-qty{font-weight:800;color:var(--brand);text-align:right;flex-shrink:0;min-width:90px}
.rl-pack{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-top:1px}
.empty-result{text-align:center;padding:30px 14px;color:var(--muted);font-size:13px;background:white;border-radius:var(--radius);border:1.5px dashed var(--border)}

/* ACTION BAR */
.actbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.actbtn{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);min-width:90px}
.actbtn.primary{background:var(--brand);color:white;border-color:var(--brand)}
.actbtn.danger{color:var(--red);border-color:#fcd5d0}
.actbtn:active{transform:scale(0.96)}

/* HISTORY MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px 32px;max-height:92vh;overflow-y:auto}
.modal-handle{width:44px;height:4px;background:#dde4e8;border-radius:2px;margin:-4px auto 16px}
.modal h3{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;text-align:center}
.hist-row{padding:11px;background:var(--bg);border-radius:10px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent}
.hist-row:active{border-color:var(--brand);background:var(--brand-soft)}
.hist-row .ht{font-size:14px;font-weight:700;color:var(--text)}
.hist-row .hd{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.hist-row-actions{display:flex;gap:6px;margin-top:8px}
.hist-row-actions button{flex:1;padding:6px;border-radius:7px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:700;cursor:pointer}
.hist-row-actions button.danger{color:var(--red);border-color:#fcd5d0}
.hist-empty{text-align:center;padding:30px 14px;color:var(--muted);font-size:13px}

/* INFO TIPS */
.tip{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px}

/* HELPERS */
.hidden{display:none !important}
</style>
</head>
<body>

<script>
// === LOCK ===
function checkPwd(){
  if(document.getElementById('pwd-input').value==='397312'){
    document.getElementById('pwd-screen').style.display='none';
    document.getElementById('app').style.display='block';
    try{localStorage.setItem('agp_unlock_calcmatos','ok');}catch(e){}
    init();
  } else {
    document.getElementById('pwd-input').value='';
    document.getElementById('pwd-input').style.borderColor='var(--red)';
    setTimeout(function(){document.getElementById('pwd-input').style.borderColor='rgba(255,255,255,0.2)';},1000);
  }
}
try{
  if(localStorage.getItem('agp_unlock_calcmatos')==='ok'){
    document.getElementById('pwd-screen').style.display='none';
    document.getElementById('app').style.display='block';
  }
}catch(e){}

// === ÉTAT GLOBAL ===
var activeMetiers = ['peinture']; // métier(s) actif(s)
var lastResult = null;             // dernier résultat calculé
var historyList = [];              // calculs sauvegardés

// === HELPERS ===
function gid(){return Date.now()*1000+Math.floor(Math.random()*1000);}
function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function ceilTo(n, step){return Math.ceil(n/step)*step;}
function fmtNb(n){
  if(n>=100) return Math.round(n).toString();
  if(n>=10) return (Math.round(n*10)/10).toString();
  return (Math.round(n*100)/100).toString();
}
// Suggère un packaging "X bidons de YL" pour un volume donné
// Seuil 0.8 : on propose la taille X si on a au moins 80% de cette taille (évite le sur-emballage)
function packLitres(litres){
  if(litres<=0) return '';
  var sizes=[15,10,5,2.5,1];
  for(var i=0;i<sizes.length;i++){
    var s=sizes[i];
    if(litres>=s*0.8){
      var n=Math.ceil(litres/s);
      return n+' bidon'+(n>1?'s':'')+' de '+s+' L';
    }
  }
  // Volume très faible (<0.8L) → on suggère quand même 1 bidon de 1L minimum
  return '1 bidon de 1 L';
}
// Suggère un packaging en sacs de Xkg
function packKg(kg, sacKg){
  if(kg<=0) return '';
  sacKg = sacKg || 25;
  var n = Math.ceil(kg/sacKg);
  return n+' sac'+(n>1?'s':'')+' de '+sacKg+' kg';
}

// Applique une marge en pourcentage proprement (évite 100*1.10 = 110.00000000000001 en JS)
// withMargin(100, 5) = 105 (et non 105.00000000000001)
function withMargin(qty, percent){
  return qty * (100 + percent) / 100;
}

// === MÉTIERS — définition ===
// Chaque métier : icon, label, render des inputs, fonction calc qui retourne items
var METIERS = {
  peinture: {
    icon:'🎨', label:'Peinture', color:'#3DB8D4',
    renderInputs: function(){
      return '<div class="frow"><label>Surface murs/plafond à peindre</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="p-surface" placeholder="0"><span class="unit-tag">m²</span></div></div>'
        +'<div class="frow"><label>Surface des ouvertures à déduire (portes/fenêtres)</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="p-deduc" placeholder="0"><span class="unit-tag">m²</span></div><div class="tip">Une porte ≈ 2 m², une fenêtre ≈ 1.5 m²</div></div>'
        +'<div class="frow2">'
          +'<div><label>Nb couches</label><select class="fselect" id="p-couches"><option value="1">1 couche</option><option value="2" selected>2 couches</option><option value="3">3 couches</option></select></div>'
          +'<div><label>Finition</label><select class="fselect" id="p-finition"><option value="mat">Mate</option><option value="satin">Satinée</option><option value="brill">Brillante</option></select></div>'
        +'</div>'
        +'<label class="crow on" id="p-appret-row"><input type="checkbox" id="p-appret" checked onchange="this.parentElement.classList.toggle(\'on\',this.checked)"><span>Avec apprêt mural (sous-couche)</span></label>'
        +'<label class="crow on" id="p-protect-row"><input type="checkbox" id="p-protect" checked onchange="this.parentElement.classList.toggle(\'on\',this.checked)"><span>Inclure protections (ruban, bâche, manchons)</span></label>';
    },
    calc: function(){
      var m2 = Math.max(0, num(document.getElementById('p-surface').value) - num(document.getElementById('p-deduc').value));
      var couches = parseInt(document.getElementById('p-couches').value)||2;
      var finition = document.getElementById('p-finition').value;
      var hasAppret = document.getElementById('p-appret').checked;
      var hasProtect = document.getElementById('p-protect').checked;
      var items = [];
      if(m2 <= 0) return {ctx:'', items:items};

      // Ratios de consommation L/m²/couche
      var ratios = {mat:0.13, satin:0.12, brill:0.11};
      var fLabel = finition==='mat' ? 'mate' : (finition==='satin' ? 'satinée' : 'brillante');

      // Apprêt (1 couche)
      if(hasAppret){
        var lApp = m2 * 0.10;
        items.push({name:'Apprêt mural', qty:Math.ceil(lApp*10)/10, unit:'L', pack:packLitres(lApp)});
      }
      // Peinture finition
      var lPeint = m2 * couches * (ratios[finition]||0.13);
      items.push({name:'Peinture finition '+fLabel, qty:Math.ceil(lPeint*10)/10, unit:'L', pack:packLitres(lPeint)});

      // Protections
      if(hasProtect){
        items.push({name:'Ruban de masquage', qty:Math.ceil(m2*0.5), unit:'m'});
        items.push({name:'Bâche de protection sol', qty:Math.ceil(m2*0.3), unit:'m²'});
        items.push({name:'Manchons de rouleau', qty:Math.max(1, Math.ceil(m2/50)), unit:'pcs'});
        items.push({name:'Pinceau angles/plinthes', qty:Math.max(1, Math.ceil(m2/80)), unit:'pcs'});
      }
      return {ctx:m2.toFixed(0)+' m² · '+couches+' couche'+(couches>1?'s':'')+' '+fLabel, items:items};
    }
  },

  platre: {
    icon:'🪨', label:'Plâtre', color:'#d4a373',
    renderInputs: function(){
      return '<div class="frow"><label>Surface à enduire/lisser</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="pl-surf-enduit" placeholder="0"><span class="unit-tag">m²</span></div></div>'
        +'<div class="frow"><label>Épaisseur d\'enduit</label><select class="fselect" id="pl-epais"><option value="1">1 mm (lissage)</option><option value="2" selected>2 mm (standard)</option><option value="3">3 mm (réparation)</option></select></div>'
        +'<div style="border-top:1.5px dashed var(--border);margin:14px 0 10px;padding-top:10px"><div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Plaques BA13 (optionnel)</div></div>'
        +'<div class="frow"><label>Surface à doubler en BA13</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="pl-surf-ba13" placeholder="0"><span class="unit-tag">m²</span></div><div class="tip">Laisse 0 si pas de doublage BA13</div></div>';
    },
    calc: function(){
      var m2enduit = num(document.getElementById('pl-surf-enduit').value);
      var ep = parseInt(document.getElementById('pl-epais').value)||2;
      var m2ba13 = num(document.getElementById('pl-surf-ba13').value);
      var items = [];
      var ctx = [];
      // Enduit (kg/m² = 1 kg par mm)
      if(m2enduit > 0){
        var kgEnduit = m2enduit * ep * 1.0;
        items.push({name:'Enduit de lissage (poudre)', qty:Math.ceil(kgEnduit), unit:'kg', pack:packKg(kgEnduit, 25)});
        ctx.push(m2enduit.toFixed(0)+' m² lissage '+ep+' mm');
      }
      // BA13
      if(m2ba13 > 0){
        var nbPlaques = Math.ceil(withMargin(m2ba13, 5) / 2.5); // 1 plaque = 2.5 m² (1.20×2.50), +5% chutes
        items.push({name:'Plaque BA13 standard (1.20×2.50)', qty:nbPlaques, unit:'pcs', pack:'≈ '+(nbPlaques*2.5).toFixed(0)+' m² couvert'});
        items.push({name:'Vis pour plaques BA13', qty:Math.ceil(m2ba13 * 25), unit:'pcs'});
        items.push({name:'Bande à joint papier', qty:Math.ceil(m2ba13 * 3), unit:'m'});
        items.push({name:'Enduit à joint', qty:Math.ceil(m2ba13 * 0.5), unit:'kg', pack:packKg(m2ba13 * 0.5, 25)});
        ctx.push(m2ba13.toFixed(0)+' m² BA13');
      }
      return {ctx:ctx.join(' · '), items:items};
    }
  },

  ite: {
    icon:'🧊', label:'Isolation extérieure', color:'#5dade2',
    renderInputs: function(){
      return '<div class="frow"><label>Surface façade à isoler</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="ite-surface" placeholder="0"><span class="unit-tag">m²</span></div></div>'
        +'<div class="frow"><label>Type d\'isolant</label><select class="fselect" id="ite-isolant"><option value="eps" selected>Polystyrène expansé (PSE/EPS)</option><option value="lr">Laine de roche</option><option value="fb">Fibre de bois</option></select></div>'
        +'<div class="frow"><label>Épaisseur de l\'isolant</label><select class="fselect" id="ite-epais"><option value="100">100 mm</option><option value="120">120 mm</option><option value="140" selected>140 mm</option><option value="160">160 mm</option><option value="200">200 mm</option></select></div>'
        +'<div class="frow"><label>Mètres d\'angles (profilés)</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="ite-angles" placeholder="0"><span class="unit-tag">m</span></div><div class="tip">Mesure tous les angles sortants (4 par fenêtre + coins de bâtiment)</div></div>';
    },
    calc: function(){
      var m2 = num(document.getElementById('ite-surface').value);
      var isolant = document.getElementById('ite-isolant').value;
      var ep = parseInt(document.getElementById('ite-epais').value)||140;
      var angles = num(document.getElementById('ite-angles').value);
      var items = [];
      if(m2 <= 0) return {ctx:'', items:items};

      var labelIsolant = {eps:'Polystyrène expansé', lr:'Laine de roche', fb:'Fibre de bois'}[isolant] || 'Isolant';
      // Panneaux : 5% chutes
      items.push({name:'Panneau '+labelIsolant+' '+ep+' mm', qty:Math.ceil(withMargin(m2, 5)), unit:'m²'});
      // Mortier-colle : 6 kg/m²
      var kgColle = m2 * 6;
      items.push({name:'Mortier-colle (encollage panneaux)', qty:Math.ceil(kgColle), unit:'kg', pack:packKg(kgColle, 25)});
      // Chevilles à rosace : 6/m² (zone courante)
      items.push({name:'Chevilles à rosace', qty:Math.ceil(m2*6), unit:'pcs'});
      // Treillis fibre verre : 10% recouvrement
      items.push({name:'Treillis fibre de verre', qty:Math.ceil(withMargin(m2, 10)), unit:'m²'});
      // Sous-enduit : 4 kg/m²
      var kgSE = m2 * 4;
      items.push({name:'Sous-enduit', qty:Math.ceil(kgSE), unit:'kg', pack:packKg(kgSE, 25)});
      // Enduit finition : 2.5 kg/m²
      var kgEF = m2 * 2.5;
      items.push({name:'Enduit de finition', qty:Math.ceil(kgEF), unit:'kg', pack:packKg(kgEF, 25)});
      // Profilés d'angle si renseigné
      if(angles > 0){
        items.push({name:'Profilé d\'angle PVC + treillis', qty:Math.ceil(angles), unit:'m'});
      }
      return {ctx:m2.toFixed(0)+' m² · '+labelIsolant+' '+ep+' mm', items:items};
    }
  },

  iti: {
    icon:'🧱', label:'Isolation intérieure', color:'#f39c12',
    renderInputs: function(){
      return '<div class="frow"><label>Surface à isoler</label><div class="finput-with-unit"><input class="finput" type="number" inputmode="decimal" step="1" min="0" id="iti-surface" placeholder="0"><span class="unit-tag">m²</span></div></div>'
        +'<div class="frow"><label>Type d\'isolant</label><select class="fselect" id="iti-isolant"><option value="lv" selected>Laine de verre</option><option value="lr">Laine de roche</option><option value="lc">Laine de chanvre</option><option value="pir">Panneau PIR</option></select></div>'
        +'<div class="frow"><label>Épaisseur de l\'isolant</label><select class="fselect" id="iti-epais"><option value="60">60 mm</option><option value="80">80 mm</option><option value="100" selected>100 mm</option><option value="120">120 mm</option><option value="140">140 mm</option></select></div>'
        +'<label class="crow" id="iti-pv-row"><input type="checkbox" id="iti-pv" onchange="this.parentElement.classList.toggle(\'on\',this.checked)"><span>Inclure pare-vapeur</span></label>'
        +'<label class="crow on" id="iti-ba13-row"><input type="checkbox" id="iti-ba13" checked onchange="this.parentElement.classList.toggle(\'on\',this.checked)"><span>Inclure plaques BA13 + ossature</span></label>';
    },
    calc: function(){
      var m2 = num(document.getElementById('iti-surface').value);
      var isolant = document.getElementById('iti-isolant').value;
      var ep = parseInt(document.getElementById('iti-epais').value)||100;
      var hasPV = document.getElementById('iti-pv').checked;
      var hasBa13 = document.getElementById('iti-ba13').checked;
      var items = [];
      if(m2 <= 0) return {ctx:'', items:items};

      var labelIsolant = {lv:'Laine de verre', lr:'Laine de roche', lc:'Laine de chanvre', pir:'Panneau PIR'}[isolant] || 'Isolant';
      items.push({name:labelIsolant+' '+ep+' mm', qty:Math.ceil(withMargin(m2, 5)), unit:'m²'});
      // Ossature métallique
      items.push({name:'Suspentes métalliques', qty:Math.ceil(m2*1.4), unit:'pcs'});
      items.push({name:'Fourrures métalliques (rails)', qty:Math.ceil(m2*1.1), unit:'m'});
      // Pare-vapeur
      if(hasPV){
        items.push({name:'Pare-vapeur (rouleau)', qty:Math.ceil(withMargin(m2, 10)), unit:'m²'});
        items.push({name:'Adhésif pare-vapeur', qty:Math.ceil(m2*0.3), unit:'m'});
      }
      // BA13 + finitions
      if(hasBa13){
        var nbPlaques = Math.ceil(withMargin(m2, 5) / 2.5);
        items.push({name:'Plaque BA13 standard (1.20×2.50)', qty:nbPlaques, unit:'pcs'});
        items.push({name:'Vis pour plaques BA13', qty:Math.ceil(m2*25), unit:'pcs'});
        items.push({name:'Bande à joint papier', qty:Math.ceil(m2*3), unit:'m'});
        items.push({name:'Enduit à joint', qty:Math.ceil(m2*0.5), unit:'kg', pack:packKg(m2*0.5, 25)});
      }
      return {ctx:m2.toFixed(0)+' m² · '+labelIsolant+' '+ep+' mm', items:items};
    }
  }
};

// === UI ===
function init(){
  loadHistory();
  renderMetierBlocks();
}

function toggleMetier(el){
  var key = el.getAttribute('data-m');
  var idx = activeMetiers.indexOf(key);
  if(idx >= 0){
    if(activeMetiers.length === 1){ alert('Au moins un métier doit être sélectionné.'); return; }
    activeMetiers.splice(idx, 1);
    el.classList.remove('on');
  } else {
    activeMetiers.push(key);
    el.classList.add('on');
  }
  renderMetierBlocks();
}

function renderMetierBlocks(){
  var box = document.getElementById('metier-blocks');
  box.innerHTML = activeMetiers.map(function(k){
    var m = METIERS[k];
    if(!m) return '';
    return '<div class="mblock" data-m="'+k+'">'
      +'<div class="mblock-title"><span class="mi">'+m.icon+'</span><h3>'+m.label+'</h3></div>'
      +m.renderInputs()
      +'</div>';
  }).join('');
}

function doCalc(){
  // Vérifier qu'il y a au moins un métier avec une surface > 0
  var allItems = [];
  var anyData = false;
  activeMetiers.forEach(function(k){
    var m = METIERS[k];
    if(!m) return;
    var res = m.calc();
    if(res.items && res.items.length){
      anyData = true;
      allItems.push({key:k, label:m.label, icon:m.icon, ctx:res.ctx, items:res.items});
    }
  });
  if(!anyData){
    alert('Saisis au moins une surface pour pouvoir calculer.');
    return;
  }
  lastResult = {
    date: Date.now(),
    metiers: activeMetiers.slice(),
    sections: allItems
  };
  renderResults();
}

function renderResults(){
  var box = document.getElementById('results');
  if(!lastResult || !lastResult.sections.length){
    box.innerHTML = '';
    document.getElementById('actbar').style.display = 'none';
    return;
  }
  box.innerHTML = lastResult.sections.map(function(sec){
    var lines = sec.items.map(function(it){
      return '<div class="result-line">'
        +'<div class="rl-name">'+esc(it.name)+(it.pack?'<span class="rl-pack">'+esc(it.pack)+'</span>':'')+'</div>'
        +'<div class="rl-qty">'+fmtNb(it.qty)+' '+esc(it.unit)+'</div>'
      +'</div>';
    }).join('');
    return '<div class="result-card">'
      +'<div class="result-head"><span class="mi">'+sec.icon+'</span><h4>'+esc(sec.label)+'</h4>'
      +(sec.ctx?'<span class="ctx">'+esc(sec.ctx)+'</span>':'')+'</div>'
      +lines
    +'</div>';
  }).join('');
  document.getElementById('actbar').style.display = 'flex';
  // Scroll doucement vers les résultats
  setTimeout(function(){ box.scrollIntoView({behavior:'smooth', block:'start'}); }, 80);
}

function resetCalc(){
  if(!confirm('Effacer le calcul affiché et toutes les saisies ?')) return;
  lastResult = null;
  document.getElementById('results').innerHTML = '';
  document.getElementById('actbar').style.display = 'none';
  // Réinitialiser tous les inputs des métiers actifs
  renderMetierBlocks();
}

// === HISTORIQUE ===
function loadHistory(){
  try{
    var d = JSON.parse(localStorage.getItem('agp_calcmatos_history'));
    historyList = Array.isArray(d) ? d : [];
  }catch(e){ historyList = []; }
}
function saveHistoryStorage(){
  try{ localStorage.setItem('agp_calcmatos_history', JSON.stringify(historyList)); }catch(e){}
}
function saveCalc(){
  if(!lastResult) return;
  var name = prompt('Nom du chantier ou client (pour retrouver ce calcul plus tard) :', '');
  if(name === null) return; // annulé
  name = (name||'').trim() || 'Calcul du '+new Date().toLocaleDateString('fr-CH');
  var entry = {
    id: gid(),
    date: lastResult.date,
    name: name,
    metiers: lastResult.metiers.slice(),
    sections: lastResult.sections
  };
  historyList.unshift(entry);
  if(historyList.length > 50) historyList.length = 50;
  saveHistoryStorage();
  alert('✅ Calcul sauvegardé : "'+name+'"');
}
function openHistory(){
  document.getElementById('ov-history').classList.add('show');
  renderHistoryList();
}
function closeHistory(){
  document.getElementById('ov-history').classList.remove('show');
}
function renderHistoryList(){
  var el = document.getElementById('hist-list');
  if(!historyList.length){
    el.innerHTML = '<div class="hist-empty">Aucun calcul sauvegardé pour le moment</div>';
    return;
  }
  el.innerHTML = historyList.map(function(h){
    var d = new Date(h.date);
    var ds = d.toLocaleDateString('fr-CH')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var mLabels = h.metiers.map(function(k){return METIERS[k]?METIERS[k].icon:'';}).join(' ');
    return '<div class="hist-row" data-id="'+h.id+'">'
      +'<div class="ht">'+esc(h.name)+'</div>'
      +'<div class="hd">'+mLabels+' · '+ds+'</div>'
      +'<div class="hist-row-actions">'
        +'<button onclick="loadHistEntry('+h.id+')">📂 Charger</button>'
        +'<button class="danger" onclick="delHistEntry('+h.id+')">🗑 Supprimer</button>'
      +'</div>'
    +'</div>';
  }).join('');
}
function loadHistEntry(id){
  var h = historyList.find(function(x){return x.id===id;});
  if(!h) return;
  lastResult = {date: h.date, metiers: h.metiers, sections: h.sections};
  renderResults();
  closeHistory();
}
function delHistEntry(id){
  if(!confirm('Supprimer ce calcul de l\'historique ?')) return;
  historyList = historyList.filter(function(x){return x.id!==id;});
  saveHistoryStorage();
  renderHistoryList();
}

// === EXPORT PDF ===
function exportPDF(){
  if(!lastResult){ alert('Rien à exporter.'); return; }
  var J = window.jspdf ? window.jspdf.jsPDF : (typeof jsPDF !== 'undefined' ? jsPDF : null);
  if(!J){ alert('PDF non disponible.'); return; }
  var doc = new J({orientation:'portrait', unit:'mm', format:'a4'});
  var pw = doc.internal.pageSize.getWidth();
  var ph = doc.internal.pageSize.getHeight();
  var y = 20;

  // Titre
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.text('Liste de matériel', pw/2, y, {align:'center'});
  y += 7;
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(100);
  var d = new Date(lastResult.date);
  doc.text(d.toLocaleDateString('fr-CH')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'), pw/2, y, {align:'center'});
  y += 10;
  doc.setTextColor(20);

  lastResult.sections.forEach(function(sec){
    if(y > ph - 30){ doc.addPage(); y = 20; }
    // En-tête de section
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.setFillColor(234, 248, 252);
    doc.rect(14, y-5, pw-28, 9, 'F');
    doc.text(sec.icon+' '+sec.label, 17, y+1);
    if(sec.ctx){
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.setTextColor(120);
      doc.text(sec.ctx, pw-17, y+1, {align:'right'});
      doc.setTextColor(20);
    }
    y += 9;

    // Lignes
    doc.setFont('helvetica','normal');
    doc.setFontSize(11);
    sec.items.forEach(function(it){
      if(y > ph - 15){ doc.addPage(); y = 20; }
      doc.text('• '+it.name, 17, y);
      doc.setFont('helvetica','bold');
      doc.text(fmtNb(it.qty)+' '+it.unit, pw-17, y, {align:'right'});
      doc.setFont('helvetica','normal');
      y += 5;
      if(it.pack){
        doc.setFontSize(9);
        doc.setTextColor(120);
        doc.text('  '+it.pack, 17, y);
        doc.setFontSize(11);
        doc.setTextColor(20);
        y += 5;
      } else {
        y += 1;
      }
    });
    y += 5;
  });

  // Pied de page
  if(y > ph - 20){ doc.addPage(); y = 20; }
  doc.setFontSize(9);
  doc.setTextColor(120);
  doc.text('AG Peinture · Calc matos · Quantités estimées sur base des ratios standards', pw/2, ph-10, {align:'center'});

  var fname = 'matos_'+d.toISOString().slice(0,10)+'.pdf';
  doc.save(fname);
}
</script>
